<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background matching portfolio theme -->
  <rect width="64" height="64" fill="#0b1020"/>
  
  <!-- Modern geometric "N" monogram -->
  <g transform="translate(10, 10)">
    <!-- Left vertical bar -->
    <rect x="0" y="0" width="5" height="44" fill="#7dd3fc" rx="1.5"/>
    
    <!-- Right vertical bar -->
    <rect x="39" y="0" width="5" height="44" fill="#7dd3fc" rx="1.5"/>
    
    <!-- Diagonal connector line -->
    <line x1="2.5" y1="44" x2="41.5" y2="0" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Purple accent stripe for depth -->
    <line x1="3" y1="42" x2="40" y2="2" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>